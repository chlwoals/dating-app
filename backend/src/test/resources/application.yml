spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MariaDB;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
app:
  jwt:
    secret: change-this-secret-key-change-this-secret-key
    expiration-ms: 3600000
  admin:
    review-key: test-admin-review-key
  upload:
    dir: build/test-uploads
  phone-auth:
    expose-dev-code: true
