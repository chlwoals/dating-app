spring:
  datasource:
    url: ${DB_URL:jdbc:mariadb://127.0.0.1:3306/dating_db}
    username: ${DB_USERNAME:dating_user}
    password: ${DB_PASSWORD:dating_password}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: YOUR_CLIENT_ID
            client-secret: YOUR_SECRET
            scope:
              - email
              - profile

app:
  jwt:
    secret: change-this-secret-key-change-this-secret-key
    expiration-ms: 3600000
  admin:
    review-key: change-admin-review-key
  upload:
    dir: uploads
  firebase:
    enabled: ${FIREBASE_ENABLED:false}
    service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:}
